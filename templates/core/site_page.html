{% extends "layouts/base.html" %}

{% block title %}
    {{ page.title }} - Yuki Blog
{% endblock %}

{% block description %}
    {{ page.subtitle }}
{% endblock %}

{% block content %}
<section class="site-info-page">
    <article class="site-info-card">
        <p class="site-info-eyebrow">
            YUKI BLOG · PAGE
        </p>

        <h1>{{ page.title }}</h1>

        <p class="site-info-subtitle">
            {{ page.subtitle }}
        </p>

        <div class="site-info-placeholder">
            <p>页面内容正在整理中。</p>
        </div>

        <a
            href="{% url 'core:home' %}"
            class="site-info-back"
        >
            <span aria-hidden="true">←</span>
            返回首页
        </a>
    </article>
</section>
{% endblock %}
